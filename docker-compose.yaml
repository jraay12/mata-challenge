version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: mata-challenge-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: qwerty
      MYSQL_DATABASE: challenge-db
    ports:
      - "3306:3306"
    volumes:
      - db_challenge_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mata-challenge-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: "qwerty"  
    depends_on:
      - db

volumes:
  db_challenge_data: